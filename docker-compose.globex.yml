# ==============================================================================
# Globex Corporation – Docker Compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.globex.yml up --build -d
# ==============================================================================

services:
  umbraco:
    build:
      args:
        CLIENT_ID: globex
    environment:
      - CLIENT_ID=globex
      - ConnectionStrings__umbracoDbDSN=Server=sql;Database=UmbracoDb_Globex;User Id=sa;Password=${SA_PASSWORD:-Umbraco_Docker_P@ss1};TrustServerCertificate=True
    ports:
      - "8082:8080"
