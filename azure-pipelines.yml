# ==============================================================================
# Azure DevOps Pipeline – Build & Deploy Client Website
# ==============================================================================
# Trigger: push to main or changes in config/clients/
# Strategy: Build a Docker image per client and push to Azure Container Registry
# ==============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - config/**
      - Dockerfile
      - docker/**

parameters:
  - name: clients
    type: object
    default:
      - id: acme
        appServiceName: app-acme-prod
      - id: globex
        appServiceName: app-globex-prod

variables:
  acrName: 'yourregistry'
  acrLoginServer: '$(acrName).azurecr.io'
  imageName: 'website-package'

stages:
  # ----------------------------------------------------------------------------
  # Stage 1: Build & Push Docker images for each client
  # ----------------------------------------------------------------------------
  - stage: Build
    displayName: 'Build Client Images'
    jobs:
      - ${{ each client in parameters.clients }}:
        - job: Build_${{ client.id }}
          displayName: 'Build ${{ client.id }}'
          pool:
            vmImage: 'ubuntu-latest'
          steps:
            - task: Docker@2
              displayName: 'Build image for ${{ client.id }}'
              inputs:
                containerRegistry: '$(acrName)'
                repository: '$(imageName)'
                command: 'build'
                Dockerfile: 'Dockerfile'
                buildContext: '.'
                arguments: '--build-arg CLIENT_ID=${{ client.id }}'
                tags: |
                  ${{ client.id }}-$(Build.BuildId)
                  ${{ client.id }}-latest

            - task: Docker@2
              displayName: 'Push image for ${{ client.id }}'
              inputs:
                containerRegistry: '$(acrName)'
                repository: '$(imageName)'
                command: 'push'
                tags: |
                  ${{ client.id }}-$(Build.BuildId)
                  ${{ client.id }}-latest

  # ----------------------------------------------------------------------------
  # Stage 2: Deploy to Azure App Service
  # ----------------------------------------------------------------------------
  - stage: Deploy
    displayName: 'Deploy to App Services'
    dependsOn: Build
    jobs:
      - ${{ each client in parameters.clients }}:
        - deployment: Deploy_${{ client.id }}
          displayName: 'Deploy ${{ client.id }}'
          environment: 'production'
          pool:
            vmImage: 'ubuntu-latest'
          strategy:
            runOnce:
              deploy:
                steps:
                  - task: AzureWebAppContainer@1
                    displayName: 'Deploy ${{ client.id }} to App Service'
                    inputs:
                      azureSubscription: 'your-azure-subscription'
                      appName: '${{ client.appServiceName }}'
                      containers: '$(acrLoginServer)/$(imageName):${{ client.id }}-$(Build.BuildId)'
                      appSettings: |
                        -WEBSITES_PORT 80
                        -SITE_TITLE "${{ client.id }}"
