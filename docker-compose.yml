# ==============================================================================
# Docker Compose – Umbraco 17 with SQL Server
# ==============================================================================
# Usage:
#   Default client:     docker compose up -d
#   Specific client:    CLIENT_ID=acme docker compose up --build -d
#   With override file: docker compose -f docker-compose.yml -f docker-compose.acme.yml up --build -d
#   View logs:          docker compose logs -f umbraco
#   Stop all:           docker compose down
#   Stop + remove data: docker compose down -v
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # Umbraco 17 CMS
  # ---------------------------------------------------------------------------
  umbraco:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLIENT_ID: ${CLIENT_ID:-default}
    ports:
      - "${UMBRACO_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - CLIENT_ID=${CLIENT_ID:-default}
      - ConnectionStrings__umbracoDbDSN=Server=sql;Database=${UMBRACO_DB:-UmbracoDb};User Id=sa;Password=${SA_PASSWORD:-Umbraco_Docker_P@ss1};TrustServerCertificate=True
      - ConnectionStrings__umbracoDbDSN_ProviderName=Microsoft.Data.SqlClient
    volumes:
      - umbraco-media:/app/wwwroot/media
      - umbraco-logs:/app/umbraco/Logs
    depends_on:
      sql:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SQL Server 2022 (Linux)
  # ---------------------------------------------------------------------------
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-Umbraco_Docker_P@ss1}
      - MSSQL_PID=Developer
      - UMBRACO_DB=${UMBRACO_DB:-UmbracoDb}
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sql-data:/var/opt/mssql
      - ./docker/sql/init-db.sh:/usr/local/bin/init-db.sh:ro
    entrypoint: /bin/bash -c "/usr/local/bin/init-db.sh & /opt/mssql/bin/sqlservr"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

volumes:
  umbraco-media:
  umbraco-logs:
  sql-data:
